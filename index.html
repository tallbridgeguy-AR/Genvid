<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      #play-button {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1000;
        padding: 15px 30px;
        background: #4285f4;
        color: white;
        border: none;
        border-radius: 50px;
        font-family: sans-serif;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(0,0,0,0.4);
      }
    </style>
  </head>
  <body>

    <button id="play-button">TAP TO START AR</button>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; filterMinCF: 0.0001; filterBeta: 0.001;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="ar-video" src="test.mp4" loop="true" crossorigin="anonymous" playsinline webkit-playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target-entity" mindar-image-target="targetIndex: 0">
        <a-video 
            id="video-screen"
            src="#ar-video" 
            width="1.6" 
            height="0.9" 
            position="0 0 0"
            scale="1.5 1.5 1.5">
        </a-video>
      </a-entity>
    </a-scene>

    <script>
      const btn = document.querySelector('#play-button');
      const sceneEl = document.querySelector('a-scene');
      const video = document.querySelector('#ar-video');

      btn.addEventListener('click', () => {
        // 1. Start AR
        const system = sceneEl.systems["mindar-image-system"];
        system.start(); 

        // 2. Audio Fix: Unmute and play immediately on user click
        video.muted = false; 
        video.volume = 1.0;
        video.play().catch(e => console.log("Playback failed:", e));
        
        btn.style.display = 'none';
      });

      const targetEntity = document.querySelector('#target-entity');
      
      targetEntity.addEventListener("targetFound", () => {
        // Ensure video plays when target reappears
        video.play();
      });

      targetEntity.addEventListener("targetLost", () => {
        // Optional: Pause when tracking is lost
        video.pause();
      });
    </script>
  </body>
</html>
