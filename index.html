<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindAR Video Experience</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      #play-button {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1000;
        padding: 15px 30px;
        background: #4285f4;
        color: white;
        border: none;
        border-radius: 50px;
        font-family: sans-serif;
        font-weight: bold;
        font-size: 16px;
        cursor: pointer;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      }
    </style>
  </head>
  <body>

    <button id="play-button">TAP TO START AR</button>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: false;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video 
          id="ar-video" 
          src="test.mp4" 
          preload="auto" 
          loop="true" 
          crossorigin="anonymous" 
          playsinline 
          webkit-playsinline 
          muted 
          autoplay>
        </video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target-entity" mindar-image-target="targetIndex: 0">
        <a-video 
            id="video-screen"
            src="#ar-video" 
            width="1" 
            height="0.56" 
            position="0 0 0"
            rotation="0 0 0">
        </a-video>
      </a-entity>
    </a-scene>

    <script>
      const btn = document.querySelector('#play-button');
      const sceneEl = document.querySelector('a-scene');
      const video = document.querySelector('#ar-video');
      const targetEntity = document.querySelector('#target-entity');

      btn.addEventListener('click', () => {
        // 1. Initialize and Start MindAR
        const scene = document.querySelector('a-scene');
        const arSystem = scene.systems["mindar-image-system"];
        arSystem.start(); 

        // 2. Play the video (it must be triggered by a click to work on mobile)
        video.play().then(() => {
          console.log("Video playing successfully");
        }).catch(err => {
          console.error("Video play error:", err);
        });
        
        // 3. Hide UI
        btn.style.display = 'none';
      });

      // Logic to pause video when target is lost and resume when found
      targetEntity.addEventListener("targetFound", () => {
        console.log("Target Found!");
        video.play();
      });

      targetEntity.addEventListener("targetLost", () => {
        console.log("Target Lost!");
        video.pause();
      });

      // Error handling for the video source
      video.addEventListener('error', (e) => {
        console.error("Error loading video file. Check the path and format.", e);
      });
    </script>
  </body>
</html>
